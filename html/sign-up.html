<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
    <header class="header">
        <div>
            <a href="../index.html">
                <h1 class="headerh">Digital <span class="onespan">Store</span></h1>
            </a>
            
        </div>
        <div>
            <input type="text" id="search" class="search-box" placeholder="ძებნა...">
        </div>
        <div class="header-right">
            <div class="auth">
              <a href="./sign-up.html"><i class="fa-regular fa-id-card"></i> Sign up</a>
              <a href="./sign-in.html"><i class="fa-regular fa-user"></i> Log in</a>
              <a href="./profile.html">profile</a>
            </div> 
            <input type="checkbox" id="menu-toggle">
        
            <label for="menu-toggle" class="menu-icon">
                <i class="fa-solid fa-bars"></i>
            </label>
        
            <div class="mobile-menu">
        
                <label for="menu-toggle" class="close">
                    <i class="fa-solid fa-xmark"></i>
                </label>
        
                <a href="../index.html">Home</a>
                <a href="./shop.html">Shop</a>
                <a href="./sign-in.html">Log in</a>
                <a href="./sign-up.html">Sign up</a>
                <a href="./profile.html">profile</a>
        
            </div>
        </div>
    </header> 
    <div class="signdiv2">
        <div class="signdiv3">
            <form class="signup" id="signupform">
                <div class="formdiv1">
                    <input class="input" id="Signup-FirstName" type="text" placeholder="you name" name="firstname">
                    <input class="input" id="Signup-LastName" type="text" placeholder="you lastname" name="lastname">
                    <input class="input" id="Signup-age" type="number" placeholder="you age" name="age">
                    <input class="input" id="Signup-email" type="email" placeholder="you email" name="email">
                </div>
                <div class="formdiv2">
                    <input class="input" id="Signup-password" type="text" placeholder="you pass" name="password">
                    <input class="input" id="Signup-adress" type="text" placeholder="adress" name="adress">
                    <input class="input" id="Signup-phone" type="phone" placeholder="you phone" name="phone">
                    <input class="input" id="Signup-zipcode" type="zipcode" placeholder="zipcode" name="zipcode">
                    <input type="text" id="Signup-avatar" placeholder="avatar" name="avatar">
                    <select name="" id="Signup-gender">
                        <option value="MALE">male</option>
                        <option value="FEMALE">female</option>
                    </select>
                    <button type="submit" onclick="signUp(event)">Sign up</button>
            </form>
            </div>
        </div>
    </div>




<script src="../js/sign-up.js"></script>
</body>
</html>
